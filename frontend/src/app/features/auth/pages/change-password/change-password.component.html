<div class="change-pass">
  <form class="change-pass__card card-panel" (ngSubmit)="onSubmit()">
    <div class="change-pass__brand">
      <span class="change-pass__logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </span>
      <span class="change-pass__brand-text">
        <strong>Definir nova senha</strong>
        <small>Por segurança, troque a senha temporária</small>
      </span>
    </div>

    @if (user(); as currentUser) {
      <p class="change-pass__hint">Conta: <strong>{{ currentUser.email }}</strong></p>
    }

    <div class="form-group">
      <label class="form-label" for="currentPassword">Senha atual (temporária)</label>
      <input
        class="form-control"
        id="currentPassword"
        name="currentPassword"
        type="password"
        autocomplete="current-password"
        placeholder="••••••••"
        [ngModel]="currentPassword()"
        (ngModelChange)="currentPassword.set($event)"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="newPassword">Nova senha</label>
      <input
        class="form-control"
        id="newPassword"
        name="newPassword"
        type="password"
        autocomplete="new-password"
        placeholder="Mínimo de 6 caracteres"
        [ngModel]="newPassword()"
        (ngModelChange)="newPassword.set($event)"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="confirmPassword">Confirmar nova senha</label>
      <input
        class="form-control"
        id="confirmPassword"
        name="confirmPassword"
        type="password"
        autocomplete="new-password"
        placeholder="Repita a nova senha"
        [ngModel]="confirmPassword()"
        (ngModelChange)="confirmPassword.set($event)"
        required
      />
    </div>

    @if (errorMessage()) {
      <p class="alert alert--error change-pass__error" role="alert">{{ errorMessage() }}</p>
    }

    <button class="btn-primary change-pass__button" type="submit" [disabled]="loading()">
      {{ loading() ? 'Salvando...' : 'Salvar nova senha' }}
    </button>
  </form>
</div>
