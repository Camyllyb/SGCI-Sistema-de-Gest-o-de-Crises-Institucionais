<app-modal [title]="title()" [closable]="!mandatory()" (close)="onClose()">
  <form (ngSubmit)="onSubmit()">
    @if (mandatory()) {
      <p class="modal-intro">
        Este é o seu primeiro acesso. Por segurança, defina uma nova senha pessoal para continuar
        utilizando o sistema.
      </p>
    }

    <div class="form-group">
      <label class="form-label" for="cp-current">Senha atual</label>
      <input
        class="form-control"
        id="cp-current"
        name="currentPassword"
        type="password"
        autocomplete="current-password"
        placeholder="••••••••"
        [ngModel]="currentPassword()"
        (ngModelChange)="currentPassword.set($event)"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="cp-new">Nova senha</label>
      <input
        class="form-control"
        id="cp-new"
        name="newPassword"
        type="password"
        autocomplete="new-password"
        [placeholder]="'Mínimo de ' + minLength + ' caracteres'"
        [ngModel]="newPassword()"
        (ngModelChange)="newPassword.set($event)"
        required
      />
      <small class="field-hint">
        Ao menos {{ minLength }} caracteres, contendo letras e números.
      </small>
    </div>

    <div class="form-group">
      <label class="form-label" for="cp-confirm">Confirmar nova senha</label>
      <input
        class="form-control"
        id="cp-confirm"
        name="confirmPassword"
        type="password"
        autocomplete="new-password"
        placeholder="Repita a nova senha"
        [ngModel]="confirmPassword()"
        (ngModelChange)="confirmPassword.set($event)"
        required
      />
    </div>

    @if (errorMessage()) {
      <p class="alert alert--error" role="alert">{{ errorMessage() }}</p>
    }

    <div class="modal-actions">
      @if (!mandatory()) {
        <button class="btn btn--secondary" type="button" [disabled]="loading()" (click)="onClose()">
          Cancelar
        </button>
      }
      <button class="btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Salvando...' : 'Salvar nova senha' }}
      </button>
    </div>
  </form>
</app-modal>
