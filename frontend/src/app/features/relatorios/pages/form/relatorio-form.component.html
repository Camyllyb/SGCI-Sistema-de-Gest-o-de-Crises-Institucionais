<section class="page">
  <header class="page__header">
    <div class="page__heading">
      <h1>Novo Relatório</h1>
      <span class="page__subtitle">Documente o encerramento de uma crise</span>
    </div>
  </header>

  @if (error(); as errorMessage) {
    <p class="alert alert--error">{{ errorMessage }}</p>
  }

  <form #relatorioForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="card-panel form-section">
      <div class="form-section__head">
        <span class="form-section__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
            <path d="M14 2v4a2 2 0 0 0 2 2h4" />
            <path d="M16 13H8M16 17H8M10 9H8" />
          </svg>
        </span>
        <span class="form-section__titles">
          <span class="form-section__title">Identificação</span>
          <span class="form-section__subtitle">Crise associada e título do relatório</span>
        </span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="criseId">Crise (Resolvida ou Encerrada) *</label>
          <select class="form-control" id="criseId" name="criseId" required [(ngModel)]="model.criseId">
            <option [ngValue]="null" disabled>Selecione...</option>
            @for (crise of crisesElegiveis(); track crise.id) {
              <option [ngValue]="crise.id">{{ crise.titulo }} ({{ crise.status }})</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="titulo">Título *</label>
          <input
            class="form-control"
            id="titulo"
            name="titulo"
            type="text"
            placeholder="Ex.: Relatório final — Vazamento Bloco C"
            required
            [(ngModel)]="model.titulo"
          />
        </div>
      </div>
    </div>

    <div class="card-panel form-section">
      <div class="form-section__head">
        <span class="form-section__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            <rect width="8" height="4" x="8" y="2" rx="1" />
            <path d="M12 11h4M12 16h4M8 11h.01M8 16h.01" />
          </svg>
        </span>
        <span class="form-section__titles">
          <span class="form-section__title">Conteúdo do Relatório</span>
          <span class="form-section__subtitle">Resumo, impactos, ações e conclusões</span>
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="resumoOcorrido">Resumo do Ocorrido *</label>
        <textarea
          class="form-control"
          id="resumoOcorrido"
          name="resumoOcorrido"
          placeholder="Descreva o que aconteceu..."
          required
          [(ngModel)]="model.resumoOcorrido"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="impactosIdentificados">Impactos Identificados</label>
        <textarea
          class="form-control"
          id="impactosIdentificados"
          name="impactosIdentificados"
          [(ngModel)]="model.impactosIdentificados"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="acoesRealizadas">Ações Realizadas</label>
        <textarea
          class="form-control"
          id="acoesRealizadas"
          name="acoesRealizadas"
          [(ngModel)]="model.acoesRealizadas"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="resultadoFinal">Resultado Final</label>
        <textarea
          class="form-control"
          id="resultadoFinal"
          name="resultadoFinal"
          [(ngModel)]="model.resultadoFinal"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="recomendacoes">Recomendações</label>
        <textarea
          class="form-control"
          id="recomendacoes"
          name="recomendacoes"
          [(ngModel)]="model.recomendacoes"
        ></textarea>
      </div>

      <div class="form__actions">
        <button class="btn-primary" type="submit" [disabled]="relatorioForm.invalid || saving()">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5" />
          </svg>
          <span>{{ saving() ? 'Salvando...' : 'Registrar Relatório' }}</span>
        </button>
        <a class="btn btn--secondary" routerLink="/relatorios">Cancelar</a>
      </div>
    </div>
  </form>
</section>
