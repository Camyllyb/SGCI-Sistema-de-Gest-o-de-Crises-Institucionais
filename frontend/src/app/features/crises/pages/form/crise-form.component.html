<section class="page">
  <header class="page__header">
    <div class="page__heading">
      <h1>Nova Crise</h1>
      <span class="page__subtitle">Preencha os campos para registrar uma nova ocorrência</span>
    </div>
  </header>

  @if (error(); as errorMessage) {
    <p class="alert alert--error">{{ errorMessage }}</p>
  }

  <form #criseForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="card-panel form-section">
      <div class="form-section__head">
        <span class="form-section__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
            <path d="M14 2v4a2 2 0 0 0 2 2h4" />
            <path d="M16 13H8M16 17H8M10 9H8" />
          </svg>
        </span>
        <span class="form-section__titles">
          <span class="form-section__title">Detalhes da Crise</span>
          <span class="form-section__subtitle">Informações descritivas da ocorrência</span>
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="titulo">Título da Ocorrência *</label>
        <input
          class="form-control"
          id="titulo"
          name="titulo"
          type="text"
          placeholder="Ex.: Vazamento de gás no Bloco C"
          required
          [(ngModel)]="model.titulo"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="descricao">Descrição Detalhada *</label>
        <textarea
          class="form-control"
          id="descricao"
          name="descricao"
          placeholder="Descreva a ocorrência com o máximo de detalhes possível..."
          required
          [(ngModel)]="model.descricao"
        ></textarea>
      </div>
    </div>

    <div class="card-panel form-section">
      <div class="form-section__head">
        <span class="form-section__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"
            />
            <circle cx="7.5" cy="7.5" r="1.5" />
          </svg>
        </span>
        <span class="form-section__titles">
          <span class="form-section__title">Classificação</span>
          <span class="form-section__subtitle">Tipo, severidade e cenário associado</span>
        </span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="nivel">Nível de Severidade *</label>
          <select class="form-control" id="nivel" name="nivel" required [(ngModel)]="model.nivel">
            @for (nivel of niveis; track nivel) {
              <option [value]="nivel">{{ nivel }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="tipoCriseId">Tipo de Crise *</label>
          <select
            class="form-control"
            id="tipoCriseId"
            name="tipoCriseId"
            required
            [(ngModel)]="model.tipoCriseId"
          >
            <option [ngValue]="null" disabled>Selecione...</option>
            @for (tipo of tipos(); track tipo.id) {
              <option [ngValue]="tipo.id">{{ tipo.nome }}</option>
            }
          </select>
        </div>

        <div class="form-group form-group--full">
          <label class="form-label" for="cenarioId">Cenário (opcional)</label>
          <select class="form-control" id="cenarioId" name="cenarioId" [(ngModel)]="model.cenarioId">
            <option [ngValue]="null">Nenhum</option>
            @for (cenario of cenarios(); track cenario.id) {
              <option [ngValue]="cenario.id">{{ cenario.descricao }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div class="card-panel form-section">
      <div class="form-section__head">
        <span class="form-section__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
            <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
            <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
            <path d="M10 6h4M10 10h4M10 14h4M10 18h4" />
          </svg>
        </span>
        <span class="form-section__titles">
          <span class="form-section__title">Vínculo Institucional</span>
          <span class="form-section__subtitle">Campus e departamento responsável</span>
        </span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="campusId">Campus *</label>
          <select
            class="form-control"
            id="campusId"
            name="campusId"
            required
            [(ngModel)]="model.campusId"
          >
            <option [ngValue]="null" disabled>Selecione...</option>
            @for (campus of campi(); track campus.id) {
              <option [ngValue]="campus.id">{{ campus.nome }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="departamentoId">Departamento *</label>
          <select
            class="form-control"
            id="departamentoId"
            name="departamentoId"
            required
            [(ngModel)]="model.departamentoId"
          >
            <option [ngValue]="null" disabled>Selecione...</option>
            @for (departamento of departamentos(); track departamento.id) {
              <option [ngValue]="departamento.id">{{ departamento.nome }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form__actions">
        <button class="btn-primary" type="submit" [disabled]="criseForm.invalid || saving()">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5" />
          </svg>
          <span>{{ saving() ? 'Salvando...' : 'Registrar Crise' }}</span>
        </button>
        <a class="btn btn--secondary" routerLink="/crises">Cancelar</a>
      </div>
    </div>
  </form>
</section>
