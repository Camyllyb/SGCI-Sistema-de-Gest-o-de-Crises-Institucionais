<section class="page">
  <header class="page__header">
    <div class="page__heading">
      <h1>Painel Geral</h1>
      <span class="page__subtitle">Visão consolidada das crises institucionais</span>
    </div>
    <div class="page__actions">
      <a class="btn-primary" routerLink="/crises/nova">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14" />
          <path d="M12 5v14" />
        </svg>
        <span>Nova Crise</span>
      </a>
    </div>
  </header>

  @if (error(); as errorMessage) {
    <p class="alert alert--error">{{ errorMessage }}</p>
  }

  @if (resumo(); as r) {
    <div class="stats">
      <article class="card-panel stat stat--total">
        <div class="stat__top">
          <span class="stat__label">Total de Crises</span>
          <span class="stat__icon" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </span>
        </div>
        <span class="stat__value">{{ r.totalCrises }}</span>
      </article>

      <article class="card-panel stat stat--info">
        <div class="stat__top">
          <span class="stat__label">Em Aberto</span>
          <span class="stat__icon" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </span>
        </div>
        <span class="stat__value">{{ r.crisesAbertas }}</span>
      </article>

      <article class="card-panel stat stat--success">
        <div class="stat__top">
          <span class="stat__label">Resolvidas</span>
          <span class="stat__icon" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M21.801 10A10 10 0 1 1 17 3.335" />
              <path d="m9 11 3 3L22 4" />
            </svg>
          </span>
        </div>
        <span class="stat__value">{{ r.crisesResolvidas }}</span>
      </article>

      <article class="card-panel stat stat--danger">
        <div class="stat__top">
          <span class="stat__label">Críticas Ativas</span>
          <span class="stat__icon" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
          </span>
        </div>
        <span class="stat__value">{{ r.crisesCriticas }}</span>
      </article>
    </div>
  }
</section>
