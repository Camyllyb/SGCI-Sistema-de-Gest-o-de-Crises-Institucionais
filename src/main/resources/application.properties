#App
quarkus.application.name=crisis-management-api
quarkus.http.port=8080

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/crisis_management

# Hibernate ORM (schema managed by Flyway)
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# JWT
mp.jwt.verify.issuer=https://crisis-management/issuer
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

# Read JWT from HttpOnly cookie instead of Authorization header
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=jwt

# Mailer (SMTP) - credenciais fornecidas via variaveis de ambiente
quarkus.mailer.from=${MAIL_FROM:no-reply@sgci.local}
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=${MAIL_START_TLS:REQUIRED}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
# Enquanto MAIL_MOCK=true os e-mails sao apenas logados no console (nao enviados).
quarkus.mailer.mock=${MAIL_MOCK:true}

# URL base do frontend (usada em links de e-mail)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# CORS - Angular dev server
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
